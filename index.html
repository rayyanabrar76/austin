<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- REPLACE: favicon with Jayden's logo/mark -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts: Anton (condensed display) + Chakra Petch (squared technical UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Chakra+Petch:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- SEO / social — edit per client -->
    <title>Jayden Austin — Marathon Coach | Run Your Fastest Race Yet</title>
    <meta
      name="description"
      content="Marathon coach & 2:29 marathoner. I help busy runners hit personal bests — without living at the track."
    />
    <meta name="theme-color" content="#F4EFDB" />

    <!-- Open Graph (Instagram / Facebook / LinkedIn link previews) -->
    <!-- NOTE: og:image / og:url must be ABSOLUTE. Update the domain if it changes. -->
    <meta property="og:site_name" content="Jayden Austin" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jayden-austin.vercel.app/" />
    <meta property="og:title" content="Jayden Austin — Marathon Coach" />
    <meta
      property="og:description"
      content="I help busy people run PBs. 2:29 marathoner. Custom plans, 1-on-1 coaching, race-day strategy."
    />
    <meta property="og:image" content="https://jayden-austin.vercel.app/og.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Jayden Austin — I help busy people run PBs" />

    <!-- Inline video preview (plays on platforms that support it: FB, iMessage, X.
         Instagram/WhatsApp still show only the image above.) -->
    <meta property="og:video" content="https://jayden-austin.vercel.app/running.mp4" />
    <meta property="og:video:secure_url" content="https://jayden-austin.vercel.app/running.mp4" />
    <meta property="og:video:type" content="video/mp4" />
    <meta property="og:video:width" content="1080" />
    <meta property="og:video:height" content="1920" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jayden Austin — Marathon Coach" />
    <meta
      name="twitter:description"
      content="I help busy people run PBs. 2:29 marathoner. Custom plans, 1-on-1 coaching, race-day strategy."
    />
    <meta name="twitter:image" content="https://jayden-austin.vercel.app/og.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
